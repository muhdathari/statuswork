<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  .sow-card {
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    padding: 22px 20px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg, #eef3f1 0%, #e3ebe8 100%);
  }
  .sow-card h2 {
    margin: 0 0 16px 0;
    font-size: 17px;
    font-weight: 600;
    color: #0b3d2e;
    text-align: center;
    letter-spacing: 0.2px;
  }
  .sow-chart-wrap {
    position: relative;
    width: 78%;
    max-width: 240px;
    flex: 1;
    min-height: 0;
  }
  .sow-center-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .sow-center-label .num {
    display: block;
    font-size: 22px;
    font-weight: 700;
    color: #0b3d2e;
    line-height: 1;
  }
  .sow-center-label .lbl {
    display: block;
    font-size: 10px;
    color: #5a766c;
    margin-top: 4px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .sow-legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px 18px;
    margin-top: 16px;
  }
  .sow-legend-item {
    display: flex;
    align-items: center;
    font-size: 12.5px;
    color: #2d4a40;
  }
  .sow-legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 7px;
    display: inline-block;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
  }
</style>
<div class="sow-card">
  <h2>Status of Work</h2>
  <div class="sow-chart-wrap">
    <canvas id="statusChart"></canvas>
    <div class="sow-center-label">
      <span class="num" id="centerTotal"></span>
      <span class="lbl">Total</span>
    </div>
  </div>
  <div class="sow-legend" id="legend"></div>
</div>
<script>
  (function() {
    const data = {
      labels: ["Actual", "Ongoing"],
      values: [10, 90],
      colors: ["#0b3d2e", "#3aa17e", "#e0a800"]
    };
    const total = data.values.reduce((a, b) => a + b, 0);
    document.getElementById('centerTotal').textContent = total;
    const ctx = document.getElementById('statusChart').getContext('2d');
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: data.labels,
        datasets: [{
          data: data.values,
          backgroundColor: data.colors,
          borderColor: '#eef3f1',
          borderWidth: 3,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '68%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0b3d2e',
            padding: 10,
            callbacks: {
              label: function(context) {
                return context.label + ': ' + context.parsed;
              }
            }
          }
        }
      }
    });
    const legendEl = document.getElementById('legend');
    data.labels.forEach((label, i) => {
      const item = document.createElement('div');
      item.className = 'sow-legend-item';
      item.innerHTML = '<span class="sow-legend-swatch" style="background:' + data.colors[i] + '"></span>' + label;
      legendEl.appendChild(item);
    });
  })();
</script>
